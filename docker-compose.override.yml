# Development Overrides - Auto-loaded by Docker Compose
#
# TRAEFIK DEBUG: Expose Traefik API at localhost:8090 for debugging
# Access dashboard at http://localhost:8090/dashboard/
#
# This file is automatically merged with docker-compose.yml when running:
#   docker compose up
#
# For production (skip overrides):
#   docker compose -f docker-compose.yml up
#
# SCALING NOTE: This override exposes fixed host ports which conflict when
# scaling API containers. Use production mode for scaling tests:
#   docker compose -f docker-compose.yml up -d --scale api=4
# The production compose uses Traefik for load balancing without port conflicts.
#
# What this enables:
# - Hot-reload development for frontend (Dockerfile.dev + Compose Watch)
# - MySQL port exposed at localhost:7654 for database tools
# - Development environment settings
# - Direct API access at localhost:7778 (single container only)

services:
  # DEVELOPMENT: Enable Traefik dashboard for debugging routing issues
  traefik:
    command:
      # Enable dashboard for development debugging
      - "--api.dashboard=true"
      - "--api.insecure=true"
      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=sysndd_proxy"
      # HTTP entrypoint
      - "--entryPoints.web.address=:80"
      # RFC 3986 encoded characters
      - "--entryPoints.web.http.encodedCharacters.allowEncodedSlash=true"
      - "--entryPoints.web.http.encodedCharacters.allowEncodedBackSlash=true"
      - "--entryPoints.web.http.encodedCharacters.allowEncodedPercent=true"
      # Health checks (on default API port so traefik healthcheck --ping works)
      - "--ping=true"
      # Debug logging for development
      - "--log.level=DEBUG"
    ports:
      - "80:80"
      - "127.0.0.1:8090:8080"

  # DEV-03: Database access for local tools
  # Connect with DBeaver, MySQL Workbench, DataGrip, etc.
  mysql:
    ports:
      # Bind to localhost only (not network-accessible for security)
      - "127.0.0.1:7654:3306"

  # DEV-02: API development mode
  # Note: Compose Watch for API is configured in docker-compose.yml
  # because the API Dockerfile serves both dev and prod
  # Development mode uses sysndd_db_dev config with Mailpit for email testing
  api:
    # Note: Direct port exposure removed to allow scaling (--scale api=4)
    # Use Traefik at localhost:80/api instead of localhost:7778/api
    # For single-container dev, uncomment: ports: ["127.0.0.1:7778:7777"]
    labels:
      # Override: allow localhost in addition to production host for local dev
      - "traefik.http.routers.api.rule=(Host(`sysndd.dbmr.unibe.ch`) || Host(`localhost`) || Host(`127.0.0.1`)) && PathPrefix(`/api`)"
    environment:
      # Override to use development config (Mailpit SMTP, not Strato)
      ENVIRONMENT: development
      # Lower worker count for development (memory-constrained local machines)
      MIRAI_WORKERS: ${MIRAI_WORKERS:-1}
    # DEV: one API container. The prod floor (deploy.replicas: 2, #344) would
    # spin two containers that both re-run startup work on a memory-constrained
    # laptop. Merges onto the base deploy block (resources are preserved).
    deploy:
      replicas: 1

  # Local-only MCP access for development. Production compose does not expose
  # MCP through Traefik or host ports by default.
  mcp:
    # Keep the backend DB path, and also attach to the non-internal dev network
    # so Docker can publish the localhost-only MCP port without a manual bridge.
    networks:
      - backend
      - proxy
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      ENVIRONMENT: development
      MCP_DB_POOL_SIZE: ${MCP_DB_POOL_SIZE:-2}

  # FRONT-04, DEV-01, DEV-02: Frontend development with hot-reload
  app:
    # Expose Vite dev server directly for development
    # Use http://localhost:5173 to bypass Traefik routing issues
    ports:
      - "127.0.0.1:5173:5173"
    # Override Traefik port for Vite dev server (production uses nginx on 8080)
    labels:
      # Override: allow localhost in addition to production host for local dev
      - "traefik.http.routers.app.rule=(Host(`sysndd.dbmr.unibe.ch`) || Host(`localhost`) || Host(`127.0.0.1`)) && PathPrefix(`/`)"
      - "traefik.http.services.app.loadbalancer.server.port=5173"
    # Override healthcheck for development
    healthcheck:
      test: ["CMD", "wget", "--spider", "--tries=1", "--no-verbose", "http://127.0.0.1:5173/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    # Override build to use development Dockerfile
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    # Volume mounts for live code changes
    volumes:
      # Mount entire app directory with caching for macOS/Windows performance
      - ./app:/app:cached
      # Anonymous volume for node_modules - CRITICAL for cross-platform
      # Prevents host node_modules from overriding container (native binaries differ)
      - /app/node_modules
    environment:
      NODE_ENV: development
      VITE_MCP_PROXY_TARGET: http://mcp:8787
    # Override memory limit from docker-compose.yml (256M is for nginx in prod)
    # Vite dev server needs less memory than webpack but still more than nginx
    deploy:
      resources:
        limits:
          memory: 2048M
    # DEV-05: Compose Watch configuration for frontend
    # Syncs source changes without full container restart
    develop:
      watch:
        # Sync source code changes
        - action: sync
          path: ./app/src
          target: /app/src
          ignore:
            - node_modules/
        # Sync public assets
        - action: sync
          path: ./app/public
          target: /app/public
        # Rebuild on dependency changes
        - action: rebuild
          path: ./app/package.json
        # Rebuild on Vite config changes
        - action: rebuild
          path: ./app/vite.config.ts

  # DEV: a single combined async worker drains BOTH lanes (#486) so local dev
  # does not need a second worker container. Production (docker-compose.yml only,
  # no overrides) runs the dedicated `worker` (default) + `worker-maintenance`
  # (maintenance) pair instead.
  worker:
    environment:
      ASYNC_JOB_QUEUES: default,maintenance

  # DEV: keep the dedicated maintenance worker OUT of the local stack — the
  # combined `worker` above already drains the maintenance lane. Assigning a
  # profile that dev never activates excludes it from `docker compose up`; it
  # still starts in production, where this override file is not loaded.
  worker-maintenance:
    profiles:
      - prod-maintenance-worker

  # DEV: keep the enrichment lane OUT of the local stack (#344). Its Traefik
  # router disappears with it, so /api/external falls through to the single dev
  # `api` via the /api router — dev stays one lane; prod runs both. Same
  # profile-gate mechanism as worker-maintenance above.
  api-enrichment:
    profiles:
      - prod-enrichment-lane
