# =============================================================================
# OWASP / UniBE security headers
# =============================================================================
#
# nginx gotcha: add_header directives are NOT inherited by a child block if
# that child defines any add_header of its own. Because local.conf and
# prod.conf set Cache-Control via add_header inside every location{}, the
# previously-defined security headers in the http{} block of nginx.conf were
# being dropped from every response.
#
# This file is sourced with `include` inside each location{} block so every
# response carries the full header set.
#
# Ref: https://nginx.org/en/docs/http/ngx_http_headers_module.html#add_header
# =============================================================================

# Force HTTPS for 2 years, include subdomains, opt in to the preload list.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Block MIME-sniffing.
add_header X-Content-Type-Options "nosniff" always;

# Clickjacking: allow same-origin framing only.
add_header X-Frame-Options "SAMEORIGIN" always;

# Leak only the origin on cross-origin navigations (modern default).
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Disable powerful browser APIs we do not use.
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), fullscreen=(self)" always;

# Content-Security-Policy tuned for the Vue SPA + self-hosted /api backend.
#
# CSP-rationale (2026-04-25):
#   * 'unsafe-eval' is RETAINED. The audit (app/scripts/audit-csp-violations.mjs)
#     finds 5 eval-like calls in vendor JS chunks that are runtime-reachable:
#       - Vue 3 runtime template compiler (new Function("Vue", code) emitted by
#         the bundler-bundled vue.esm-bundler.js path; reached by CMS-driven
#         template rendering in app/src/views/admin/ManageAbout.vue)
#       - NGL viewer (assets/ngl-*.js) uses new Function() to construct Web
#         Worker bodies for off-main-thread MD/PDB parsing
#       - markdown-it / DOMPurify path (assets/useMarkdownRenderer-*.js)
#         emits new Function() under specific transform paths
#     None of these are own-code; all are needed at runtime. Removing
#     'unsafe-eval' breaks the 3D structure viewer and the admin CMS preview.
#   * 'unsafe-inline' for script-src is REMOVED. The only inline <script> in
#     app/dist/index.html is the Schema.org JSON-LD block; that block is
#     build-time-stable so we hash it instead of allowing arbitrary inline
#     scripts. The hash below is generated by app/scripts/audit-csp-violations.mjs
#     against app/dist/. Regenerate after any change to the inline JSON-LD
#     payload in app/index.html (see ADR 2026-04-25-csp-hsts-policy.md).
#   * 'unsafe-inline' for style-src is RETAINED. Bootstrap-Vue-Next, NGL, and
#     d3 emit inline style="" attributes that CSP cannot hash. The CSP audit
#     reports the inline-style count after each build; refactoring vendor
#     emit-paths is out of scope. ADR records the trade-off.
#
# CSP script-src hashes are generated by app/scripts/audit-csp-violations.mjs
# against the Vite build output. Regenerate after any edit to app/index.html
# OR after upgrading Vite.
# See .planning/decisions/2026-04-25-csp-hsts-policy.md.
#
# After upgrading Vue, NGL, markdown-it, or any vendor that may add or remove
# inline content / eval-like patterns, run:
#   cd app && npm run build && cd ..
#   node app/scripts/audit-csp-violations.mjs --build app/dist
# and reconcile the directive (script-src hashes plus any change to the
# 'unsafe-eval' / 'unsafe-inline' stance).
add_header Content-Security-Policy "default-src 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'sha256-ueWfB/sU1extuDGhe9jlQtX0uersTIhViOyPUGNpxlg=' 'unsafe-eval'; base-uri 'self'; object-src 'none'; connect-src 'self'; form-action 'self'; frame-src 'self'; frame-ancestors 'self'; manifest-src 'self';" always;
